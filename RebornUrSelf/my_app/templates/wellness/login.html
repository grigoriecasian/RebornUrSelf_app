{% extends 'wellness/base.html' %}
{% block title %}Autentificare - RebornUrSelf{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10">
    <div class="rounded-2xl p-8" style="background-color: #111d33; border: 1px solid #1a2d4a;">
        <div class="text-center mb-6">
            <div class="w-16 h-16 rounded-full mx-auto mb-4 flex items-center justify-center" style="background: rgba(16,185,129,0.15);">
                <i class="fa-solid fa-leaf text-2xl text-emerald-400"></i>
            </div>
            <h1 class="text-2xl font-bold text-white">Bine ai revenit!</h1>
            <p class="text-gray-400 mt-1">Intra in contul tau RebornUrSelf</p>
        </div>

        <form method="post" class="space-y-4">
            {% csrf_token %}

            <div>
                <label for="id_username" class="block text-sm font-medium text-gray-300 mb-1.5">Utilizator</label>
                <input type="text" name="username" id="id_username" required
                    class="form-input" placeholder="Numele tau de utilizator">
            </div>

            <div>
                <label for="id_password" class="block text-sm font-medium text-gray-300 mb-1.5">Parola</label>
                <input type="password" name="password" id="id_password" required
                    class="form-input" placeholder="Parola ta">
            </div>

            {% if form.errors %}
            <div class="p-3 rounded-xl text-sm" style="background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #fca5a5;">
                <i class="fa-solid fa-circle-exclamation mr-1"></i> Utilizator sau parola incorecta.
            </div>
            {% endif %}

            <button type="submit" class="w-full bg-emerald-500 text-white py-3 rounded-xl font-semibold hover:bg-emerald-400 transition text-center" style="box-shadow: 0 0 15px rgba(16,185,129,0.25);">
                <i class="fa-solid fa-right-to-bracket mr-1"></i> Autentificare
            </button>
        </form>

        <div class="text-center mt-6 text-sm text-gray-500">
            Nu ai cont? <a href="{% url 'register' %}" class="text-emerald-400 font-semibold hover:text-emerald-300 transition">Creeaza unul</a>
        </div>
    </div>
</div>
{% endblock %}
